<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#120E08" />
    <title>AetherTrack — Offline</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            background: #120E08;
            color: #C8B9A5;
            font-family: 'Instrument Sans', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            max-width: 360px;
            width: 90%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1.25rem;
            opacity: 0.75;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 650;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 0.9rem;
            line-height: 1.6;
            color: rgba(200, 185, 165, 0.65);
            margin-bottom: 1.75rem;
        }

        button {
            background: #D4905A;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 1.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        button:active {
            opacity: 0.75;
        }

        .status {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: rgba(200, 185, 165, 0.4);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">◌</div>
        <h1>You're offline</h1>
        <p>AetherTrack couldn't reach the network. Your cached data is still available – tap Retry when you're back
            online.</p>
        <button onclick="retryConnection()">Retry Connection</button>
        <p class="status" id="status">Checking connection…</p>
    </div>
    <script>
        function retryConnection() {
            if (navigator.onLine) {
                window.location.href = '/';
            } else {
                document.getElementById('status').textContent = 'Still offline. Please check your connection.';
            }
        }

        window.addEventListener('online', () => {
            document.getElementById('status').textContent = 'Connection restored! Redirecting…';
            setTimeout(() => window.location.href = '/', 1000);
        });

        // Auto-retry every 10 s
        setInterval(() => {
            if (navigator.onLine) window.location.href = '/';
        }, 10000);
    </script>
</body>

</html>

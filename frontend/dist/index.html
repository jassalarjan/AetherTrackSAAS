  <!-- Theme init — must run before first paint to prevent flash -->
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('theme');
        var storedScheme = localStorage.getItem('colorScheme') || 'warm';
        var isDark = storedTheme === 'dark' ||
          (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-scheme', storedScheme);
        // Apply terracotta brand colour immediately to prevent colour flash
        var warmBrand = storedScheme === 'warm' || storedScheme === 'orange'
          ? '#C4713A'
          : (storedScheme === 'blue' ? '#2563eb'
            : storedScheme === 'purple' ? '#9333ea'
              : storedScheme === 'green' ? '#16a34a'
                : storedScheme === 'pink' ? '#db2777'
                  : '#C4713A');
        document.documentElement.style.setProperty('--brand', warmBrand);
        document.documentElement.style.setProperty('--color-primary', warmBrand);
      } catch (e) { }
    })();
  </script>

  <!-- =====================================================================
       Native HTML Preloader
       Visible immediately — before JS parses, before React mounts.
       apl-hide class (opacity:0 + visibility:hidden) is added by App.jsx
       on first useEffect after React mount.
       ===================================================================== -->
  <div id="app-preloader" aria-hidden="true">
    <style>
      #app-preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #F7F3EE;
        transition: opacity 0.38s ease, visibility 0.38s ease;
      }

      [data-theme="dark"] #app-preloader {
        background: #151008;
      }

      #app-preloader.apl-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .apl-morph-loader {
        --color-one: #ffbf48;
        --color-two: #be4a1d;
        --color-three: #ffbf4780;
        --color-four: #bf4a1d80;
        --color-five: #ffbf4740;
        --time-animation: 2s;
        position: relative;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        box-shadow: 0 0 25px 0 var(--color-three), 0 20px 50px 0 var(--color-four);
        animation: apl-loader-colorize calc(var(--time-animation) * 3) ease-in-out infinite;
        isolation: isolate;
      }

      .apl-morph-loader::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border-top: solid 1px var(--color-one);
        border-bottom: solid 1px var(--color-two);
        background: linear-gradient(180deg, var(--color-five), var(--color-four));
        box-shadow: inset 0 10px 10px 0 var(--color-three), inset 0 -10px 10px 0 var(--color-four);
        z-index: 0;
      }

      .apl-loader-box {
        width: 100px;
        height: 100px;
        background: linear-gradient(180deg, var(--color-one) 30%, var(--color-two) 70%);
        mask: url(#apl-loader-clipping);
        -webkit-mask: url(#apl-loader-clipping);
        position: relative;
        z-index: 1;
      }

      .apl-morph-loader svg {
        position: absolute;
        inset: 0;
        width: 100px;
        height: 100px;
      }

      .apl-morph-loader svg #apl-loader-clipping {
        filter: contrast(15);
        animation: apl-loader-roundness calc(var(--time-animation) / 2) linear infinite;
      }

      .apl-morph-loader svg #apl-loader-clipping polygon {
        filter: blur(7px);
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(1) {
        transform-origin: 75% 25%;
        transform: rotate(90deg);
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(2) {
        transform-origin: 50% 50%;
        animation: apl-loader-rotation var(--time-animation) linear infinite reverse;
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(3) {
        transform-origin: 50% 60%;
        animation: apl-loader-rotation var(--time-animation) linear infinite;
        animation-delay: calc(var(--time-animation) / -3);
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(4) {
        transform-origin: 40% 40%;
        animation: apl-loader-rotation var(--time-animation) linear infinite reverse;
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(5) {
        transform-origin: 40% 40%;
        animation: apl-loader-rotation var(--time-animation) linear infinite reverse;
        animation-delay: calc(var(--time-animation) / -2);
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(6) {
        transform-origin: 60% 40%;
        animation: apl-loader-rotation var(--time-animation) linear infinite;
      }

      .apl-morph-loader svg #apl-loader-clipping polygon:nth-child(7) {
        transform-origin: 60% 40%;
        animation: apl-loader-rotation var(--time-animation) linear infinite;
        animation-delay: calc(var(--time-animation) / -1.5);
      }

      @keyframes apl-loader-rotation {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes apl-loader-roundness {
        0% {
          filter: contrast(15);
        }

        20% {
          filter: contrast(3);
        }

        40% {
          filter: contrast(3);
        }

        60% {
          filter: contrast(15);
        }

        100% {
          filter: contrast(15);
        }
      }

      @keyframes apl-loader-colorize {
        0% {
          filter: hue-rotate(0deg);
        }

        20% {
          filter: hue-rotate(-30deg);
        }

        40% {
          filter: hue-rotate(-60deg);
        }

        60% {
          filter: hue-rotate(-90deg);
        }

        80% {
          filter: hue-rotate(-45deg);
        }

        100% {
          filter: hue-rotate(0deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {

        .apl-morph-loader,
        .apl-morph-loader svg #apl-loader-clipping,
        .apl-morph-loader svg #apl-loader-clipping polygon {
          animation: none !important;
          filter: none !important;
        }
      }

      /* Brand wordmark */

        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--brand, #C4713A);
        opacity: 0.55;
        -webkit-user-select: none;
           -moz-user-select: none;
                user-select: none;
      }
    </style>

<body>
  <!-- Theme init — must run before first paint to prevent flash -->
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('theme');
        var storedScheme = localStorage.getItem('colorScheme') || 'warm';
        var isDark = storedTheme === 'dark' ||
          (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-scheme', storedScheme);
        // Apply terracotta brand colour immediately to prevent colour flash
        var warmBrand = storedScheme === 'warm' || storedScheme === 'orange'
          ? '#C4713A'
          : (storedScheme === 'blue' ? '#2563eb'
            : storedScheme === 'purple' ? '#9333ea'
              : storedScheme === 'green' ? '#16a34a'
                : storedScheme === 'pink' ? '#db2777'
                  : '#C4713A');
        document.documentElement.style.setProperty('--brand', warmBrand);
        document.documentElement.style.setProperty('--color-primary', warmBrand);
      } catch (e) { }
    })();
  </script>
  <div id="root"></div>

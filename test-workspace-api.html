<!DOCTYPE html>
<html>
<head>
    <title>Test Workspace API</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        button { padding: 10px 20px; margin: 10px; background: #667eea; color: white; border: none; cursor: pointer; border-radius: 5px; }
        button:hover { background: #5568d3; }
        .output { background: #2a2a2a; padding: 15px; margin-top: 20px; border-radius: 5px; white-space: pre-wrap; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        input { padding: 8px; margin: 5px; width: 300px; }
    </style>
</head>
<body>
    <h1>🧪 Workspace API Tester</h1>
    
    <div>
        <h3>Step 1: Get Auth Token</h3>
        <input type="email" id="email" placeholder="Email" value="admin@taskflow.com">
        <input type="password" id="password" placeholder="Password" value="Admin@123">
        <button onclick="login()">Login</button>
    </div>

    <div>
        <h3>Step 2: Test Workspace Endpoints</h3>
        <button onclick="testGetWorkspaces()">GET All Workspaces</button>
        <button onclick="testGetStats()">GET Stats</button>
        <button onclick="testCreateWorkspace()">CREATE Workspace</button>
    </div>

    <div class="output" id="output">Results will appear here...</div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let token = localStorage.getItem('accessToken');

        function log(message, isError = false) {
            const output = document.getElementById('output');
            const className = isError ? 'error' : 'success';
            output.innerHTML += `<span class="${className}">${message}</span>\n`;
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                log('🔐 Logging in...');
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    token = data.accessToken;
                    localStorage.setItem('accessToken', token);
                    log('✅ Login successful!');
                    log(`Token: ${token.substring(0, 50)}...`);
                } else {
                    log(`❌ Login failed: ${data.message}`, true);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }

        async function testGetWorkspaces() {
            if (!token) {
                log('❌ Please login first!', true);
                return;
            }

            try {
                log('\n📋 Fetching all workspaces...');
                const response = await fetch(`${API_URL}/workspaces`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log(`✅ Success! Found ${data.length} workspaces`);
                    log(JSON.stringify(data, null, 2));
                } else {
                    log(`❌ Failed: ${data.message}`, true);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }

        async function testGetStats() {
            if (!token) {
                log('❌ Please login first!', true);
                return;
            }

            try {
                log('\n📊 Fetching workspace stats...');
                const response = await fetch(`${API_URL}/workspaces/stats/summary`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Stats retrieved successfully!');
                    log(JSON.stringify(data, null, 2));
                } else {
                    log(`❌ Failed: ${data.message}`, true);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }

        async function testCreateWorkspace() {
            if (!token) {
                log('❌ Please login first!', true);
                return;
            }

            const workspaceName = 'Test Workspace ' + Date.now();
            
            try {
                log(`\n📝 Creating workspace: ${workspaceName}...`);
                const response = await fetch(`${API_URL}/workspaces`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: workspaceName,
                        type: 'COMMUNITY',
                        ownerEmail: ''
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    log('✅ Workspace created successfully!');
                    log(JSON.stringify(data, null, 2));
                } else {
                    log(`❌ Failed: ${data.message}`, true);
                    log(`Status: ${response.status}`, true);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }

        // Check if already logged in
        if (token) {
            log('✅ Found existing token in localStorage');
            log(`Token: ${token.substring(0, 50)}...`);
        }
    </script>
</body>
</html>
